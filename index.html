<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tension has moved | Dr Noor Rai</title>
    <link rel="canonical" href="https://tension.noor-rai-ca.workers.dev/">
    <style>
      :root { color-scheme: dark; }
      body { background: #0f1411; color: #e8ece9; font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; margin: 0; }
      main { margin: 0 auto; max-width: 560px; padding: 74px 22px; }
      h1 { font-size: 34px; font-weight: 400; letter-spacing: -.03em; margin: 0 0 12px; }
      h1 em { color: #9aa39e; font-style: italic; }
      p { color: #9aa39e; margin: 0 0 24px; }
      .label { color: #9aa39e; display: block; font-size: 11px; letter-spacing: .04em; margin-bottom: 16px; text-transform: uppercase; }
      a, button { background: #7fb069; border: 0; color: #0f1411; display: inline-block; font: inherit; margin: 0 10px 10px 0; padding: 12px 18px; text-decoration: none; }
      a.secondary { background: transparent; border: 1px solid #26302b; color: #e8ece9; }
    </style>
  </head>
  <body>
    <main id="migration" hidden>
      <span class="label">Tension has moved</span>
      <h1>Carry <em>local</em> data forward</h1>
      <p>training data was found in this browser. download it here, then open the synced app and import it from settings after creating an account.</p>
      <button id="download-data" type="button">download local data</button>
      <a class="secondary" href="https://tension.noor-rai-ca.workers.dev/">open synced app</a>
    </main>
    <noscript><main><p>Tension now runs on Cloudflare with private sync.</p><a href="https://tension.noor-rai-ca.workers.dev/">open Tension</a></main></noscript>
    <script>
      const destination = 'https://tension.noor-rai-ca.workers.dev/';
      const saved = localStorage.getItem('tension.v1.state');
      let meaningful = false;
      try {
        const state = JSON.parse(saved);
        meaningful = Boolean(state && (
          state.sets?.length ||
          state.custom_exercises?.length ||
          Object.keys(state.targets || {}).length ||
          Object.keys(state.user_term_exposure || {}).length ||
          state.lessons?.archive?.length
        ));
      } catch (_error) {
        meaningful = false;
      }
      if (!meaningful) {
        window.location.replace(destination);
      } else {
        document.getElementById('migration').hidden = false;
        document.getElementById('download-data').addEventListener('click', () => {
          const blob = new Blob([saved], { type: 'application/json' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'tension-local-data.json';
          link.click();
          URL.revokeObjectURL(link.href);
        });
      }
    </script>
  </body>
</html>
