<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1411">
    <title>Tension | Dr Noor Rai</title>
    <meta name="description" content="A private, synced weekly hard-set volume tracker built around MEV, MAV and MRV.">
    <link rel="canonical" href="https://tension.noor-rai-ca.workers.dev/">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%230f1411' stroke='%234a6b3f'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%237fb069'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>Tension</span><small>by Dr Noor Rai</small></div>
      <nav class="utility-nav" aria-label="Views">
        <button class="nav-button active" data-view="dashboard">week</button>
        <button class="nav-button" data-view="settings">settings</button>
        <button class="nav-button account-button" id="account-button" data-action="account">sign in</button>
      </nav>
    </header>
    <main id="app" class="app-shell" aria-live="polite"></main>
    <button class="log-fab" type="button" data-action="open-log"><span>+</span> log set</button>
    <div id="overlay-root"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="data.js"></script>
    <script src="body-diagram.svg.js"></script>
    <script src="cloud.js"></script>
    <script src="app.js"></script>
  </body>
</html>
